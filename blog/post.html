<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="stylesheet" href="/css/blog/blog-post.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=BBH+Bartle&family=BBH+Bogle&family=BBH+Hegarty&family=Bebas+Neue&family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Outfit:wght@300&display=swap" rel="stylesheet">
</head>
<body>  
  <div class="blog-wrapper">
    <div class="blog-grid">
      <section class="blog-header">
        <div class="blog-header-grid">
          <div class="blog-header-feature-image"></div>
          <div class="blog-header-info">
            <h1 class="blog-header-title"></h1>
            <h3 class="blog-header-date"></h3>
            <div class="blog-header-authors">
              <label for="Author">Authors:</label>
            </div>
            <p class="blog-header-excerpt"></p>
            <label for="Tags">This post contains the following tags:</label>
            <ul class="blog-header-tags"></ul>
          </div>
        </div>
      </section>
      <hr class="blog-divider">
      <section class="blog-content">
        
      <section class="blog-footer">
      <label for="github">Github: </label>
      <a href="https://github.com/JxViii" target="_blank">JxViii
        <img src="/icons/github-logo.png" alt="Github Logo">
      </a>
      </section>
    </div>
  </div>
  <script type="module" src="/js/blog/post.js"></script>
</body>
</html>
